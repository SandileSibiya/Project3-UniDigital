<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <!-- Add QR code library -->
  <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
    }
    .login-container {
      background-color: white;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
      text-align: center;
    }
    /* .time {
        position: absolute;
        top: 10px;
        right: 10px;
        font-size: 14px;
    } */
    h2 {
      color: #333;
      margin-bottom: 20px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      background-color: #0066cc;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
      margin-top: 10px;
    }
    button:hover {
      background-color: #0055aa;
    }
    .register-link {
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }
    .register-link a {
      color: #0066cc;
      text-decoration: none;
    }
    .error-message {
      color: red;
      margin-top: 10px;
      font-size: 14px;
    }
    #qr-canvas {
      display: none;
    }
  </style>
</head>
<body>
<!-- <div class="time" id="timeDisplay">9:41</div> -->
<div class="login-container">
  <h2>LOGIN</h2>
  <h3>Cape Peninsula University of Technology</h3>
  <form id="loginForm">
    <p>Sign In</p>
    <input type="text" id="username" placeholder="Username" required>
    <input type="password" id="password" placeholder="Password" required>
    <button type="submit">LOGIN</button>
    <div id="errorMessage" class="error-message"></div>
  </form>
  <div class="register-link">
    Not A Registered User?<br>
    <a href="#">Link Your Student Details</a>
  </div>
</div>

<!-- Hidden canvas for QR code generation -->
<canvas id="qr-canvas"></canvas>

<script>
  // Function to generate QR code as data URL
  function generateQRCodeDataURL(text) {
    return new Promise((resolve) => {
      const tempDiv = document.createElement('div');
      document.body.appendChild(tempDiv);

      const qrcode = new QRCode(tempDiv, {
        text: text,
        width: 55,
        height: 55,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
      });

      setTimeout(() => {
        const canvas = tempDiv.querySelector('canvas');
        const dataURL = canvas.toDataURL('image/png');
        document.body.removeChild(tempDiv);
        resolve(dataURL);
      }, 200);
    });
  }

  // Users data
  const users = [
    {
      name: "Sandile",
      email: "sandile@example.com",
      password: "password",
      initial: "SE",
      gender: "Male",
      surname: "Sibiya",
      department: "Information Technology",
      studentNumber: "230975623",
      image: "NFC Reader Logo.png"
    },
    {
      name: "Banele",
      email: "banele@example.com",
      password: "password",
      initial: "BE",
      gender: "Male",
      surname: "Mthunzi",
      department: "Accounting and Finance",
      studentNumber: "220123456",
      image: "absa logo.png"
    },
    {
      name: "Precious",
      email: "precious@example.com",
      password: "password",
      initial: "PM",
      gender: "Female",
      surname: "Davis",
      department: "Information Technology",
      studentNumber: "231223344",
      image: "nfc-reader-logo.png"
    }
  ];

  // Update time display
  //function updateTime() {
  //    const now = new Date();
  //    const hours = now.getHours().toString().padStart(2, '0');
  //    const minutes = now.getMinutes().toString().padStart(2, '0');
  //    document.getElementById('timeDisplay').textContent = `${hours}:${minutes}`;
  //}
  //setInterval(updateTime, 1000);
  //updateTime();

  // Handle form submission
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorElement = document.getElementById('errorMessage');

    const user = users.find(u =>
            (u.email === username || u.studentNumber === username) && u.password === password
    );

    if (user) {
      const qrText = `Student No: ${user.studentNumber}`;
      const qrImageURL = await generateQRCodeDataURL(qrText);

      // Add the QR code to the user object just before storing
      const userWithQR = {
        ...user,
        qr: qrImageURL
      };

      sessionStorage.setItem('currentUser', JSON.stringify(userWithQR));
      window.location.href = 'TapSession.html';
    } else {
      errorElement.textContent = 'Invalid username or password';
    }
  });
</script>
</body>
</html>
